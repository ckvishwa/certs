name: Quality Gates

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: certs-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Non-secret placeholders — CI never touches a real Supabase project.
  # These only need to be present and truthy so build-time config checks
  # and unit tests don't throw; no live network calls depend on them.
  NEXT_PUBLIC_SUPABASE_URL: "https://ci-placeholder.supabase.co"
  NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: "ci-placeholder-publishable-key"
  SUPABASE_SERVICE_ROLE_KEY: "ci-placeholder-service-role-key"
  AI_PROVIDER: "openai"
  OPENAI_API_KEY: "ci-placeholder-openai-key"
  ANTHROPIC_API_KEY: "ci-placeholder-anthropic-key"
  NEXT_PUBLIC_SITE_URL: "http://localhost:3000"

jobs:
  quality:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
